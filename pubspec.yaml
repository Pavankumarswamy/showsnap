name: showsnap
description: ShowSnap — Mobile Ticket Booking App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # Media / Cloudinary
  cloudinary_flutter: ^1.3.0
  cloudinary_url_gen: ^1.6.0
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.6.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Payment
  razorpay_flutter: ^1.3.6

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Animation & Motion (V2)
  lottie: ^3.1.3
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.10+1
  auto_size_text: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  gap: ^3.0.1
  confetti: ^0.8.0

  # V4 — Admin & TM UI Elevation
  data_table_2: ^2.5.14
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  flutter_speed_dial: ^7.0.0
  percent_indicator: ^4.2.3
  step_progress_indicator: ^1.0.2
  table_calendar: ^3.1.2
  expandable: ^5.0.1
  flutter_staggered_grid_view: ^0.7.0

  # V3 Packages
  youtube_player_flutter: ^9.1.1
  file_picker: ^8.1.2
  video_player: ^2.9.2
  flutter_rating_bar: ^4.0.1
  timeline_tile: ^2.0.0
  dotted_border: ^2.1.0
  flutter_slidable: ^3.1.1
  badges: ^3.1.2
  showcaseview: ^3.0.0
  flutter_typeahead: ^5.2.0
  intl_phone_field: ^3.2.0
  add_2_calendar: ^3.0.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  http: ^1.6.0
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - .env
